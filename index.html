<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BiG CHaTT - Official </title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-dark: #070913;
            --panel-bg: #0d1222;
            --accent-blue: #2563eb;
            --accent-pink: #d946ef;
            --text-main: #f8fafc;
            --danger: #ef4444;
            --vip-gold: #f59e0b;
            --input-bg: #05070f;
            --border-color: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: '-apple-system', BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER */
        .top-header { height: 70px; background: var(--panel-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 10; shrink: 0; }
        .brand-section { display: flex; align-items: center; gap: 12px; }
        .brand-name { font-weight: 800; font-size: 24px; letter-spacing: 0.5px; }
        .live-counter { background: rgba(16, 185, 129, 0.12); color: #10b981; padding: 6px 14px; border-radius: 30px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .live-pulse { width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        
        .header-actions { display: flex; align-items: center; gap: 12px; position: relative; }
        .btn-vip-top { background: linear-gradient(135deg, var(--vip-gold), #b45309); color: white; padding: 8px 18px; border: none; border-radius: 30px; font-weight: 700; cursor: pointer; font-size: 13px; transition: 0.2s; box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2); }
        .btn-vip-top:hover { transform: translateY(-1px); filter: brightness(1.1); }
        
        .user-profile-tag { background: #05070f; padding: 8px 16px; border-radius: 30px; font-size: 14px; font-weight: 700; border: 1px solid var(--border-color); cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .user-profile-tag.vip-user { color: var(--vip-gold); border-color: var(--vip-gold); }
        
        .profile-dropdown { position: absolute; top: 45px; right: 0; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; width: 160px; display: none; z-index: 100; overflow: hidden; }
        .dropdown-item { padding: 12px 16px; font-size: 14px; color: var(--text-main); cursor: pointer; font-weight: 600; }
        .dropdown-item:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        /* MAIN APPLICATON CONTAINER */
        .main-app-container { display: flex; flex-direction: column; flex: 1; height: calc(100vh - 70px); position: relative; }
        
        /* VIDEO GRID KRAH PËR KRAH (PERFEKT) */
        .video-grid { flex: 1; display: flex; background: #000; position: relative; width: 100%; height: 100%; }
        .video-wrapper { flex: 1; width: 50%; position: relative; background: #020408; overflow: hidden; border: 1px solid #0f172a; display: flex; align-items: center; justify-content: center; }
        
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* 🔄 RREGULLIMI I KRYES (MIRROR EFFECT) VETËM PËR KAMERËN TËNDE */
        #local-stream-view { transform: scaleX(-1); -webkit-transform: scaleX(-1); }
        /* KAMERA E TJETRIT NDREQET MOS TË JETË MBAPSHT */
        #remote-stream-view { transform: scaleX(1); -webkit-transform: scaleX(1); }

        .video-label { position: absolute; bottom: 20px; left: 20px; background: rgba(7, 9, 19, 0.85); backdrop-filter: blur(12px); padding: 8px 18px; border-radius: 30px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.08); z-index: 6; }
        .video-dot { width: 8px; height: 8px; background: #64748b; border-radius: 50%; }
        .video-dot.active { background: #10b981; box-shadow: 0 0 10px #10b981; }

        /* CONTROL BAR SERIOZE */
        .control-bar { height: 90px; background: var(--panel-bg); display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border-color); padding: 0 32px; z-index: 10; shrink: 0; }
        
        /* DIZAJNI I SHTETEVE (SERIOZ) */
        .country-filter-box { display: flex; align-items: center; gap: 10px; background: var(--input-bg); padding: 10px 20px; border-radius: 30px; border: 1px solid var(--border-color); }
        .country-filter-box label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .country-filter-box select { background: transparent; border: none; color: white; font-weight: 700; font-size: 14px; outline: none; cursor: pointer; padding-right: 5px; }
        .country-filter-box select option { background: var(--panel-bg); color: white; }

        .button-group-actions { display: flex; gap: 12px; }
        .btn { padding: 12px 28px; border: none; border-radius: 30px; font-weight: 700; cursor: pointer; font-size: 14px; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-start { background: #10b981; color: white; }
        .btn-start:hover { background: #059669; }
        .btn-skip { background: var(--accent-blue); color: white; padding: 12px 36px; font-size: 15px; }
        .btn-skip:hover { background: #1d4ed8; }
        .btn-stop { background: var(--danger); color: white; }
        .btn-stop:hover { background: #dc2626; }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; }

        /* MODALS & AUTH */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 5, 10, 0.92); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: var(--panel-bg); border: 1px solid var(--border-color); width: 100%; max-width: 420px; padding: 32px; border-radius: 24px; text-align: center; }
        
        .auth-tabs { display: flex; background: var(--input-bg); border-radius: 40px; padding: 4px; margin-bottom: 24px; border: 1px solid var(--border-color); }
        .auth-tab { flex: 1; padding: 12px; border: none; background: transparent; color: #64748b; font-weight: 700; cursor: pointer; border-radius: 30px; font-size: 14px; }
        .auth-tab.active { background: var(--accent-blue); color: white; }
        
        .field-group { text-align: left; margin-bottom: 16px; }
        .field-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 6px; font-weight: 700; text-transform: uppercase; }
        .field-group input, .field-group select { width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; color: white; font-size: 14px; outline: none; }
        .btn-primary { width: 100%; padding: 14px; background: var(--accent-blue); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; }
        
        /* BAN SCREEN */
        .ban-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #03050a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; display: none; text-align: center; padding: 24px; }
        .ban-card-box { background: var(--panel-bg); border: 1px solid var(--border-color); padding: 24px; border-radius: 20px; width: 100%; max-width: 380px; margin-top: 20px; }

        /* RESPONSIVE DIZAJNI PËR TELEFON (VERTAL) 📱 */
        @media (max-width: 768px) {
            .top-header { padding: 0 16px; height: 65px; }
            .brand-name { font-size: 20px; }
            .main-app-container { height: calc(100vh - 65px); }
            
            /* Ekran Vertikal: Kamera e tjetrit lart, e jotja poshtë */
            .video-grid { flex-direction: column; }
            .video-wrapper { width: 100%; height: 50%; }
            
            .control-bar { height: auto; padding: 16px; flex-direction: column; gap: 14px; width: 100%; }
            .country-filter-box { width: 100%; justify-content: space-between; }
            .button-group-actions { width: 100%; display: flex; gap: 8px; }
            .btn { flex: 1; justify-content: center; padding: 14px; font-size: 14px; }
            .btn-skip { flex: 2; }
        }
    </style>
</head>
<body>

    <div id="ban-blocker-screen" class="ban-screen">
        <h1 style="color: var(--danger); font-size: 28px;">LLOGARIA JUAJ ËSHTË BLLOKUAR! 🚫</h1>
        <p id="ban-countdown-text" style="color: #94a3b8; margin: 12px 0; font-weight: 600;"></p>
        <div class="ban-card-box">
            <h3 style="color: #10b981; margin-bottom: 12px;">🔓 Zhbllokohu Menjëherë</h3>
            <div class="field-group"><input type="text" id="ban-card-num" placeholder="Numri i Kartelës (16 shifra)" maxlength="16"></div>
            <button class="btn-primary" style="background: #10b981;" onclick="processUnbanPayment()">PAGUAJ TANI 1.99€</button>
        </div>
        <p style="color: #64748b; font-size: 13px; margin-top: 20px; cursor: pointer; text-decoration: underline;" onclick="bypassBanForNewAccount()">Krijo llogari të re</p>
    </div>

    <div id="vip-payment-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="border-color: var(--vip-gold);">
            <h3 style="color: var(--vip-gold); font-size: 22px; margin-bottom: 12px;">👑 Porosit Statusin VIP</h3>
            <p style="color: #94a3b8; font-size: 14px; margin-bottom: 16px;">Me statusin VIP fiton distinktivin e artë dhe përparësi në matchmaking.</p>
            <div class="field-group"><label>Numri i Kartelës</label><input type="text" id="card-number" placeholder="4111 2222 3333 4444" maxlength="16"></div>
            <button class="btn-primary" style="background: var(--vip-gold); color: #000;" onclick="processVipCardPayment()">PAGUAJ 3.99€</button>
            <button class="btn-primary" style="background: transparent; color: #64748b; margin-top: 8px;" onclick="closeVipModal()">Anulo</button>
        </div>
    </div>

    <div id="auth-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab active" onclick="switchAuthTab('login')">Sign-In</button>
                <button id="tab-register" class="auth-tab" onclick="switchAuthTab('register')">Sign-Up</button>
            </div>
            <div id="auth-form-body"></div>
            <button class="btn-primary" style="margin-top: 15px;" onclick="submitAuthForm()">VAZHDO</button>
        </div>
    </div>

    <div class="top-header">
        <div class="brand-section">
            <span class="brand-name">BiG <span style="color:var(--accent-pink)">CHaTT</span></span>
            <div id="live-users-counter" class="live-counter"><div class="live-pulse"></div> 0 Online</div>
        </div>
        <div class="header-actions">
            <button id="vip-buy-btn" class="btn-vip-top" onclick="openVipModal()">👑 BLEJ VIP</button>
            <div id="profile-identity" class="user-profile-tag" onclick="toggleDropdown()">Duke u lidhur...</div>
            <div id="profile-menu-dropdown" class="profile-dropdown">
                <div class="dropdown-item" onclick="triggerSignOut()">Exit Platform</div>
            </div>
        </div>
    </div>

    <div class="main-app-container">
        
        <div class="video-grid">
            <div class="video-wrapper">
                <video id="remote-stream-view" autoplay playsinline></video>
                <div id="stranger-status-text" class="video-label">
                    <div id="remote-dot" class="video-dot"></div> I huaji (Stranger)
                </div>
            </div>
            <div class="video-wrapper">
                <video id="local-stream-view" autoplay playsinline muted></video>
                <div class="video-label"><div class="video-dot active"></div> Kamera Jote</div>
            </div>
        </div>

        <div class="control-bar">
            <div class="country-filter-box">
                <label>📍 Filter:</label>
                <select id="match-country-filter">
                    <option value="all">🌍 All Countries</option>
                    <option value="Kosovë">Kosovo</option>
                    <option value="Shqipëri">Albania</option>
                    <option value="Gjermani">Germany</option>
                    <option value="Zvicër">Switzerland</option>
                </select>
            </div>
            <div class="button-group-actions">
                <button id="start-session-btn" class="btn btn-start">NDIZ KAMERËN</button>
                <button id="skip-session-btn" class="btn btn-skip" disabled>SKIP (TJETRI)</button>
                <button id="stop-session-btn" class="btn btn-stop" disabled>NDALO</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://big-chat-2pro.onrender.com";
        const socket = io(API_URL);

        let currentMode = 'login';
        let currentUser = null;
        let localStream = null;
        let peerInstance = null;
        let activeCall = null;

        window.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('active_chat_session');
            if(savedUser) {
                currentUser = JSON.parse(savedUser);
                checkUserBanStatus();
            } else {
                switchAuthTab('login');
            }
        });

        function checkUserBanStatus() {
            if (!currentUser) return;
            if (currentUser.isBanned) {
                document.getElementById('ban-countdown-text').innerText = currentUser.banExpires === 'permanent' ? "Bllokim Përgjithmonë!" : "Përkohësisht i bllokuar.";
                document.getElementById('ban-blocker-screen').style.display = 'flex';
                return;
            }
            applySuccessfulAuth();
        }

        function switchAuthTab(mode) {
            currentMode = mode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-register').classList.toggle('active', mode === 'register');
            
            const container = document.getElementById('auth-form-body');
            if(mode === 'login') {
                container.innerHTML = `
                    <div class="field-group"><label>Username</label><input type="text" id="auth-user" placeholder="Username..."></div>
                    <div class="field-group"><label>Password</label><input type="password" id="auth-pass" placeholder="••••••••"></div>
                `;
            } else {
                container.innerHTML = `
                    <div class="field-group"><label>Emri yt</label><input type="text" id="reg-name" placeholder="Shkruaj emrin"></div>
                    <div class="field-group"><label>Shteti</label><select id="reg-country"><option value="Kosovë">Kosovo</option><option value="Shqipëri">Albania</option></select></div>
                    <div class="field-group"><label>Zgjidh Username</label><input type="text" id="auth-user" placeholder="Username i ri..."></div>
                    <div class="field-group"><label>Password</label><input type="password" id="auth-pass" placeholder="••••••••"></div>
                `;
            }
        }

        async function submitAuthForm() {
            const usernameInput = document.getElementById('auth-user').value.trim();
            const passwordInput = document.getElementById('auth-pass').value;
            if(!usernameInput || !passwordInput) return alert("Ju lutem plotësoni të gjitha fushat!");

            let endpoint = currentMode === 'login' ? '/api/auth/login' : '/api/auth/register';
            let bodyData = { username: usernameInput, password: passwordInput };

            if(currentMode === 'register') {
                bodyData.name = document.getElementById('reg-name').value.trim();
                bodyData.country = document.getElementById('reg-country').value;
            }

            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                const data = await res.json();
                if(data.success) {
                    currentUser = data.user;
                    localStorage.setItem('active_chat_session', JSON.stringify(currentUser));
                    checkUserBanStatus();
                } else { alert(data.message); }
            } catch(e) { alert("Serveri nuk po përgjigjet!"); }
        }

        function applySuccessfulAuth() {
            document.getElementById('auth-modal').style.display = 'none';
            document.getElementById('ban-blocker-screen').style.display = 'none';
            const profileTag = document.getElementById('profile-identity');
            
            if(currentUser.isVip) {
                profileTag.classList.add('vip-user');
                profileTag.innerHTML = `👑 ${currentUser.username} ▾`;
                document.getElementById('vip-buy-btn').style.display = 'none';
            } else {
                profileTag.innerHTML = `${currentUser.username} ▾`;
            }
            startRealtimeEngine();
        }

        function startRealtimeEngine() {
            if (peerInstance) return;
            const myPeerId = 'bg-' + currentUser.username + '-' + Math.floor(Math.random() * 9999);
            peerInstance = new Peer(myPeerId);

            peerInstance.on('open', (id) => {
                socket.emit('user-online', { username: currentUser.username, peerId: id, country: currentUser.country, isVip: currentUser.isVip });
            });

            peerInstance.on('call', (incomingCall) => {
                activeCall = incomingCall;
                incomingCall.answer(localStream);
                incomingCall.on('stream', (strangerStream) => {
                    document.getElementById('remote-stream-view').srcObject = strangerStream;
                    document.getElementById('remote-dot').classList.add('active');
                });
            });

            socket.on('update-counter', (count) => {
                document.getElementById('live-users-counter').innerText = `${count} Online`;
            });

            socket.on('match-found', (opponent) => {
                if (activeCall) activeCall.close();
                document.getElementById('stranger-status-text').innerText = opponent.isVip ? `👑 ${opponent.username} (VIP)` : `${opponent.username} (${opponent.country})`;
                
                let outCall = peerInstance.call(opponent.peerId, localStream);
                if(outCall) {
                    activeCall = outCall;
                    outCall.on('stream', (strangerStream) => {
                        document.getElementById('remote-stream-view').srcObject = strangerStream;
                        document.getElementById('remote-dot').classList.add('active');
                    });
                }
            });

            socket.on('opponent-disconnected', () => {
                if (activeCall) activeCall.close();
                document.getElementById('remote-stream-view').srcObject = null;
                document.getElementById('remote-dot').classList.remove('active');
                document.getElementById('stranger-status-text').innerText = "I huaji doli. Kliko SKIP...";
            });
        }

        document.getElementById('start-session-btn').addEventListener('click', async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: true 
                });
                document.getElementById('local-stream-view').srcObject = localStream;
                document.getElementById('start-session-btn').disabled = true;
                document.getElementById('skip-session-btn').disabled = false;
                document.getElementById('stop-session-btn').disabled = false;
            } catch (err) { alert("Ju lutem lejoni qasjen në kamerë dhe mikrofon!"); }
        });

        document.getElementById('skip-session-btn').addEventListener('click', () => {
            document.getElementById('remote-stream-view').srcObject = null;
            document.getElementById('remote-dot').classList.remove('active');
            document.getElementById('stranger-status-text').innerText = "Duke kërkuar...";
            const selectedCountry = document.getElementById('match-country-filter').value;
            socket.emit('request-match', { filterCountry: selectedCountry });
        });

        document.getElementById('stop-session-btn').addEventListener('click', () => {
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            location.reload();
        });

        function toggleDropdown() {
            const d = document.getElementById('profile-menu-dropdown');
            d.style.display = d.style.display === 'block' ? 'none' : 'block';
        }

        function triggerSignOut() {
            localStorage.removeItem('active_chat_session');
            location.reload();
        }

        async function processVipCardPayment() {
            if(document.getElementById('card-number').value.length < 14) return alert("Kartela jo valide!");
            try {
                const response = await fetch(`${API_URL}/api/payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser.username, action: 'vip' })
                });
                const data = await response.json();
                if(data.success) {
                    currentUser = data.user;
                    localStorage.setItem('active_chat_session', JSON.stringify(currentUser));
                    alert("Urime! Tani jeni VIP 👑");
                    location.reload();
                }
            } catch(e) { alert("Pagesa dështoi!"); }
        }

        async function processUnbanPayment() {
            if(document.getElementById('ban-card-num').value.length < 14) return alert("Kartela jo valide!");
            try {
                const response = await fetch(`${API_URL}/api/payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser.username, action: 'unban_payment' })
                });
                const data = await response.json();
                if(data.success) {
                    currentUser = data.user;
                    localStorage.setItem('active_chat_session', JSON.stringify(currentUser));
                    alert("Llogaria u zhbllokua! 🎉");
                    location.reload();
                }
            } catch(e) { alert("Pagesa dështoi!"); }
        }

        function bypassBanForNewAccount() { triggerSignOut(); }
    </script>
</body>
</html>
